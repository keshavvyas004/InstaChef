name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. GENERATE THE MISSING ARCHITECTURE FIRST
      - name: Inject Missing iOS Compatibility Folder
        run: |
          flutter create --platforms=ios .
          cd ios
          pod repo update
          
      # 2. SANITIZE AND IMPORT PERSONAL CODE-SIGNING CERTIFICATE
      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Safely decode the certificate text string generated on your Mac
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n ' | base64 --decode --output $CERTIFICATE_PATH

          # Setup isolated temporary keychain environment
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Clean import execution
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -A
          
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          
      # 3. WRITE THE SYSTEM INSTRUCTIONS FOR DEVELOPMENT EXPORT
      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > ios/Runner/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          
      - name: Get dependencies
        run: flutter pub get

      # 4. EXECUTE A DEVELOPMENT BUILD (Compatible with Personal Apple ID signing)
      - name: Build IPA
        run: flutter build ipa --debug --export-options-plist=ios/Runner/ExportOptions.plist
        
      # 5. GRACEFUL DISPOSAL
      - name: Clean up keychain
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa-build
          path: build/ios/ipa/*.ipa
