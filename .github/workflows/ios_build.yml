name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. GENERATE ARCHITECTURE AND OVERRIDE MINIMUM DEPLOYMENT TARGET
      - name: Inject Missing iOS Compatibility Folder
        run: |
          flutter create --platforms=ios .
          cd ios
          
          # Force the global Podfile platform to iOS 16.0 to appease ML Kit dependencies
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '16.0'/g" Podfile
          
          pod repo update
          
      # 2. SANITIZE AND IMPORT PERSONAL CODE-SIGNING CERTIFICATE
      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n ' | base64 --decode --output $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -A
          
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          
      # 3. WRITE THE SYSTEM INSTRUCTIONS FOR DEVELOPMENT EXPORT
      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > ios/Runner/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          
      # 4. GET DEPENDENCIES AND INJECT TARGET OVERRIDES INTO DISCOVERED PLUGINS
      - name: Get dependencies
        run: |
          flutter pub get
          cd ios
          
          # Dynamically forces every underlying CocoaPod target to compile at iOS 16.0 
          cat << 'EOF' >> Podfile

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.0'
              end
            end
          end
          EOF

      # 5. EXECUTE A DEVELOPMENT BUILD
      - name: Build IPA
        run: flutter build ipa --debug --export-options-plist=ios/Runner/ExportOptions.plist
        
      # 6. GRACEFUL DISPOSAL
      - name: Clean up keychain
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa-build
          path: build/ios/ipa/*.ipa
