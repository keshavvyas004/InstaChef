name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      # 1. Force iOS deployment target configuration cleanly across the layout
      - name: Set iOS deployment target
        run: |
          # Safely check and force the global platform target to 16.0
          if grep -q "^platform :ios" ios/Podfile; then
            sed -i '' "s/^platform :ios.*/platform :ios, '16.0'/" ios/Podfile
          else
            echo "platform :ios, '16.0'" | cat - ios/Podfile > temp && mv temp ios/Podfile
          fi

          # Inline edit the existing post_install block instead of creating a new one
          sed -i '' "s/flutter_additional_ios_build_settings(target)/flutter_additional_ios_build_settings(target)\n    target.build_configurations.each { |config| config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.0' }/g" ios/Podfile

          # Update the Xcode project's own deployment target setting
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/Runner.xcodeproj/project.pbxproj

          cd ios
          pod repo update
          pod install

      # 2. Install your personal development certificate
      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n ' | base64 --decode --output $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -A
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      # 3. Dynamic Export Options using Xcode's Automatic Development configuration
      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > ios/Runner/ExportOptions.plist
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> ios/Runner/ExportOptions.plist
          echo '<plist version="1.0">' >> ios/Runner/ExportOptions.plist
          echo '<dict>' >> ios/Runner/ExportOptions.plist
          echo '  <key>method</key>' >> ios/Runner/ExportOptions.plist
          echo '  <key>teamID</key>' >> ios/Runner/ExportOptions.plist
          echo "  <string>${TEAM_ID}</string>" >> ios/Runner/ExportOptions.plist
          echo '  <key>signingStyle</key>' >> ios/Runner/ExportOptions.plist
          echo '  <string>automatic</string>' >> ios/Runner/ExportOptions.plist
          echo '</dict>' >> ios/Runner/ExportOptions.plist
          echo '</plist>' >> ios/Runner/ExportOptions.plist

      # 4. Build step (invalid flag removed)
      - name: Build IPA
        run: |
          flutter build ipa --debug \
            --export-options-plist=ios/Runner/ExportOptions.plist

      # 5. Clean up local runner environments
      - name: Clean up keychain
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa-build
          path: build/ios/ipa/*.ipa
