name: instachef
description: "A new Flutter project."
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.0.0
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  image_picker: ^1.0.7
  smooth_page_indicator: ^2.0.1
  shared_preferences: ^2.2.2
  file_picker: ^11.0.2
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  permission_handler: ^12.0.1
  cloudinary_flutter: ^1.3.0
  cloudinary_url_gen: ^1.8.0
  cloudinary_api: ^1.1.1
  flutter_dotenv: ^6.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^1.2.0
  cloud_functions: ^6.0.1
  share_plus: ^12.0.2
  google_mlkit_text_recognition: ^0.15.1
  country_code_picker: ^3.0.0
  intl: ^0.20.2
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^17.2.2
  googleapis_auth: ^2.0.0
  flutter_tts: ^4.2.5
  speech_to_text: ^7.0.0
  google_sign_in: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - images/logo.png
    - images/profile.png
    - images/food.png
    - images/story.png
    - lib/assets/secrets/service_account.json

# 👇 Must be at root level, not under flutter:
flutter_native_splash:
  color: "#0f1d25"
  image: images/logo.png
  android: true
  ios: true
  web: true
